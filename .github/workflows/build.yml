name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  setup:
    name: Generate shared security parameters
    runs-on: ubuntu-latest
    outputs:
      security-token: ${{ steps.gen.outputs.security-token }}
    steps:
      - name: Download Godot Secure script
        run: |
          curl -fL --retry 5 --retry-delay 10 \
            "https://github.com/emabrey/Godot-Secure/releases/download/v1.4.0/godot_secure.py" \
            -o godot_secure.py
      - name: Generate security token
        id: gen
        run: python3 godot_secure.py --mode generate --non-interactive

  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: "Windows Desktop"
            artifact: windows
            release-name: estragon_release.exe
            debug-name: estragon_debug.exe
          - os: ubuntu-latest
            preset: "Linux"
            artifact: linux
            release-name: estragon_release
            debug-name: estragon_debug
          - os: macos-latest
            preset: "macOS"
            artifact: macos
            release-name: estragon_release.zip
            debug-name: estragon_debug.zip

    steps:
      - name: Checkout estragon
        uses: actions/checkout@v4

      - name: Build Godot Secure
        id: godot-secure
        uses: emabrey/GodotSecureAction@v1
        with:
          godot-version:  '4.6-stable'
          algorithm:      aes
          encryption-key: ${{ secrets.GODOT_ENCRYPTION_KEY }}
          security-token: ${{ needs.setup.outputs.security-token }}
          lto:            full

      - name: Locate Godot binaries
        shell: bash
        run: |
          bin="godot-source/bin"

          # macOS editor lives inside a .app bundle
          if [ -f "$bin/Godot.app/Contents/MacOS/Godot" ]; then
            editor="$(pwd)/$bin/Godot.app/Contents/MacOS/Godot"
          else
            editor=$(find "$bin" -maxdepth 1 -name 'godot.*.editor.*' \
                      ! -name '*.o' ! -name '*.debug' | head -1)
            editor="$(pwd)/$editor"
          fi

          release=$(find "$bin" -maxdepth 1 -name 'godot.*.template_release.*' \
                    ! -name '*.o' ! -name '*.debug' | head -1)
          debug=$(find "$bin" -maxdepth 1 -name 'godot.*.template_debug.*' \
                  ! -name '*.o' ! -name '*.debug' | head -1)

          echo "GODOT_EDITOR=$editor"                >> "$GITHUB_ENV"
          echo "GODOT_TEMPLATE_RELEASE=$(pwd)/$release" >> "$GITHUB_ENV"
          echo "GODOT_TEMPLATE_DEBUG=$(pwd)/$debug"  >> "$GITHUB_ENV"

          echo "Editor:           $editor"
          echo "Template release: $(pwd)/$release"
          echo "Template debug:   $(pwd)/$debug"

      - name: Patch export preset template paths
        shell: bash
        run: |
          python3 - "$GODOT_TEMPLATE_RELEASE" "$GODOT_TEMPLATE_DEBUG" <<'EOF'
          import re, sys

          release, debug = sys.argv[1], sys.argv[2]
          cfg = "estragon/export_presets.cfg"

          with open(cfg) as f:
              content = f.read()

          content = re.sub(r'custom_template/release=""', f'custom_template/release="{release}"', content)
          content = re.sub(r'custom_template/debug=""',   f'custom_template/debug="{debug}"',   content)

          with open(cfg, "w") as f:
              f.write(content)
          EOF

      - name: Create export output directory
        shell: bash
        run: mkdir export

      - name: Export release build
        shell: bash
        working-directory: estragon
        run: |
          chmod +x "$GODOT_EDITOR" || true
          "$GODOT_EDITOR" --headless \
            --export-release "${{ matrix.preset }}" \
            "${{ github.workspace }}/export/${{ matrix.release-name }}"

      - name: Export debug build
        shell: bash
        working-directory: estragon
        run: |
          "$GODOT_EDITOR" --headless \
            --export-debug "${{ matrix.preset }}" \
            "${{ github.workspace }}/export/${{ matrix.debug-name }}"

      - name: Upload estragon artifact
        uses: actions/upload-artifact@v4
        with:
          name: estragon-${{ matrix.artifact }}
          path: export/
