name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  setup:
    name: Generate shared security parameters
    runs-on: ubuntu-latest
    outputs:
      security-token: ${{ steps.gen.outputs.security-token }}
    steps:
      - name: Download Godot Secure script
        run: |
          curl -fL --retry 5 --retry-delay 10 \
            "https://github.com/emabrey/Godot-Secure/releases/download/v1.4.0/godot_secure.py" \
            -o godot_secure.py
      - name: Generate security token
        id: gen
        run: python3 godot_secure.py --mode generate --non-interactive

  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: "Windows Desktop"
            artifact: windows
            release-name: estragon_release.exe
            debug-name: estragon_debug.exe
            scons-platform: platform=windows
            scons-arch: arch=x86_64
            # use_llvm=no: Windows Server 2025 runners default to LLVM but
            # it hits a COMDAT linker bug; MSVC produces a clean build.
            extra-scons-args: 'module_mono_enabled=yes use_llvm=no'
          - os: ubuntu-latest
            preset: "Linux"
            artifact: linux
            release-name: estragon_release
            debug-name: estragon_debug
            scons-platform: platform=linuxbsd
            scons-arch: arch=x86_64
            extra-scons-args: 'module_mono_enabled=yes'
          - os: macos-latest
            preset: "macOS"
            artifact: macos
            release-name: estragon_release.zip
            debug-name: estragon_debug.zip
            scons-platform: platform=macos
            scons-arch: arch=arm64
            extra-scons-args: 'module_mono_enabled=yes'

    steps:
      - name: Checkout estragon
        uses: actions/checkout@v4

      - name: Set up local NuGet source for GodotSharp
        shell: bash
        run: |
          mkdir -p "$HOME/.godotnuget"
          dotnet nuget add source "$HOME/.godotnuget" --name GodotNuget 2>/dev/null || true

      # Build only the editor first so we can run --generate-mono-glue before
      # templates are compiled (required for module_mono_enabled=yes builds).
      - name: Build Godot Secure editor
        id: godot-secure
        uses: emabrey/GodotSecureAction@v1
        with:
          godot-version:    '4.6-stable'
          algorithm:        aes
          encryption-key:   ${{ secrets.GODOT_ENCRYPTION_KEY }}
          security-token:   ${{ needs.setup.outputs.security-token }}
          target:           editor
          extra-scons-args: ${{ matrix.extra-scons-args }}

      - name: Locate editor binary
        id: find-editor
        shell: bash
        run: |
          src="${{ steps.godot-secure.outputs.godot-source-path }}"
          bin="$src/bin"

          if [ -f "$bin/Godot.app/Contents/MacOS/Godot" ]; then
            editor="$bin/Godot.app/Contents/MacOS/Godot"
          else
            editor=$(find "$bin" -maxdepth 1 \
              -name 'godot.*.editor.*' ! -name '*.o' ! -name '*.debug' \
              | head -1)
          fi

          chmod +x "$editor" || true
          echo "editor=$editor"   >> "$GITHUB_OUTPUT"
          echo "source=$src"      >> "$GITHUB_OUTPUT"
          echo "Editor: $editor"

      - name: Generate Mono glue
        shell: bash
        run: |
          "${{ steps.find-editor.outputs.editor }}" --headless \
            --generate-mono-glue \
            "${{ steps.find-editor.outputs.source }}/modules/mono/glue"

      - name: Build GodotSharp assemblies
        shell: bash
        working-directory: ${{ steps.find-editor.outputs.source }}
        run: |
          python3 modules/mono/build_scripts/build_assemblies.py \
            --godot-output-dir ./bin --push-nupkgs-local GodotNuget

      # Build both export templates against the already-patched source.
      # SCRIPT_AES256_ENCRYPTION_KEY embeds the same key used for the editor.
      - name: Build export templates
        shell: bash
        working-directory: ${{ steps.find-editor.outputs.source }}
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.GODOT_ENCRYPTION_KEY }}
        run: |
          scons target=template_release ${{ matrix.scons-platform }} ${{ matrix.scons-arch }} \
            ${{ matrix.extra-scons-args }} lto=full
          scons target=template_debug ${{ matrix.scons-platform }} ${{ matrix.scons-arch }} \
            ${{ matrix.extra-scons-args }}

      - name: Install export templates
        shell: bash
        run: |
          src="${{ steps.find-editor.outputs.source }}"
          bin="$src/bin"

          # Godot template directory name encodes version + mono variant
          GODOT_VER="4.6.stable.mono"

          case "$RUNNER_OS" in
            Linux)
              TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/$GODOT_VER"
              mkdir -p "$TEMPLATES_DIR"
              release=$(find "$bin" -maxdepth 1 \
                -name 'godot.*.template_release.*' ! -name '*.o' ! -name '*.debug' \
                | head -1)
              debug=$(find "$bin" -maxdepth 1 \
                -name 'godot.*.template_debug.*' ! -name '*.o' ! -name '*.debug' \
                | head -1)
              cp "$release" "$TEMPLATES_DIR/linux_release.x86_64"
              cp "$debug"   "$TEMPLATES_DIR/linux_debug.x86_64"
              echo "Installed Linux templates to $TEMPLATES_DIR"
              ;;

            macOS)
              TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/$GODOT_VER"
              mkdir -p "$TEMPLATES_DIR"

              release=$(find "$bin" -maxdepth 1 \
                -name 'godot.*.template_release.*' ! -name '*.o' ! -name '*.debug' \
                | head -1)
              debug=$(find "$bin" -maxdepth 1 \
                -name 'godot.*.template_debug.*' ! -name '*.o' ! -name '*.debug' \
                | head -1)

              # macOS export templates must be a zip containing a partial .app
              # bundle. Godot unpacks it, injects the binary, and repacks.
              WORKDIR="$(mktemp -d)/Godot.app"
              mkdir -p "$WORKDIR/Contents/MacOS"
              mkdir -p "$WORKDIR/Contents/Resources"
              cp "$src/misc/dist/macos/Info.plist" "$WORKDIR/Contents/"
              cp "$src/misc/dist/macos/"*.icns     "$WORKDIR/Contents/Resources/" 2>/dev/null || true
              cp "$release" "$WORKDIR/Contents/MacOS/godot_macos_release.arm64"
              cp "$debug"   "$WORKDIR/Contents/MacOS/godot_macos_debug.arm64"
              chmod +x "$WORKDIR/Contents/MacOS/"*

              (cd "$(dirname "$WORKDIR")" && zip -r "$TEMPLATES_DIR/macos.zip" Godot.app)
              echo "Installed macOS template zip to $TEMPLATES_DIR/macos.zip"
              ;;

            Windows)
              TEMPLATES_DIR="$APPDATA/Godot/export_templates/$GODOT_VER"
              mkdir -p "$TEMPLATES_DIR"
              release=$(find "$bin" -maxdepth 1 \
                -name 'godot.*.template_release.*.exe' ! -name '*.o' \
                | head -1)
              debug=$(find "$bin" -maxdepth 1 \
                -name 'godot.*.template_debug.*.exe' ! -name '*.o' \
                | head -1)
              cp "$release" "$TEMPLATES_DIR/windows_release_x86_64.exe"
              cp "$debug"   "$TEMPLATES_DIR/windows_debug_x86_64.exe"
              echo "Installed Windows templates to $TEMPLATES_DIR"
              ;;
          esac

      - name: Create export output directory
        shell: bash
        run: mkdir export

      - name: Export release build
        shell: bash
        working-directory: estragon
        run: |
          "${{ steps.find-editor.outputs.editor }}" --headless \
            --export-release "${{ matrix.preset }}" \
            "${{ github.workspace }}/export/${{ matrix.release-name }}"

      - name: Export debug build
        shell: bash
        working-directory: estragon
        run: |
          "${{ steps.find-editor.outputs.editor }}" --headless \
            --export-debug "${{ matrix.preset }}" \
            "${{ github.workspace }}/export/${{ matrix.debug-name }}"

      - name: Upload estragon artifact
        uses: actions/upload-artifact@v4
        with:
          name: estragon-${{ matrix.artifact }}
          path: export/
